version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: industrial_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: fastapi_backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: streamlit_frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend

  simulator:
    build:
      context: ./backend/simulator

    container_name: sensor_simulator

    depends_on:
      - backend

volumes:
  postgres_data: